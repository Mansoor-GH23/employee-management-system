name: Backend CI

on:
push:
paths:
- 'Backend/'
- '.github/workflows/backend-ci.yml'
pull_request:
paths:
- 'Backend/'
- '.github/workflows/backend-ci.yml'

jobs:
build-and-test:
runs-on: windows-latest
steps:
- name: Checkout code
uses: actions/checkout@v4

  - name: Restore NuGet packages with offline config
    run: dotnet restore Backend/EmployeeManagementSystem.sln --configfile Backend/nuget.config

  - name: Build solution
    run: dotnet build Backend/EmployeeManagementSystem.sln --configuration Release --no-restore

  - name: Run tests
    run: dotnet test Backend/EmployeeManagementSystem.Tests/EmployeeManagementSystem.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

  - name: Upload test results
    uses: actions/upload-artifact@v4
    with:
      name: NUnit-Test-Results
      path: '**/TestResults/*.trx'
