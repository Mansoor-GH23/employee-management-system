name: Backend CI

on:
  push:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'Backend/**'

jobs:
  build-and-test:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: Backend

    steps:
      - name: 🧾 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Update if using different version

      - name: 🔁 Restore dependencies with offline NuGet source
        run: dotnet restore EmployeeManagementSystem.sln --configfile nuget.config

      - name: 🏗 Build solution
        run: dotnet build EmployeeManagementSystem.sln --no-restore --configuration Release

      - name: 🧪 Run NUnit tests
        run: dotnet test EmployeeManagementSystem.Tests/EmployeeManagementSystem.Tests.csproj --no-build --configuration Release --logger trx
