name: Backend CD

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: ems-api-app
  AZURE_RESOURCE_GROUP: employee-management
  IMAGE_NAME: ems-api-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Docker image to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: <your-acr-login-server>.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker Build & Push
        run: |
          docker build -t <your-acr-login-server>.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push <your-acr-login-server>.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App (Linux Container)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: <your-acr-login-server>.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
