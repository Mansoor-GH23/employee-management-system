name: Build and Deploy Backend to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: emsacr123.azurecr.io        # Replace with your ACR login server
  IMAGE_NAME: ems-api-app

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repo
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore .NET dependencies
      run: dotnet restore ./Backend

    - name: Build .NET project
      run: dotnet build --no-restore ./Backend

    - name: Test .NET project
      run: dotnet test ./Backend/EmployeeManagementSystem.Tests/EmployeeManagementSystem.Tests.csproj --no-build --verbosity normal

    - name: Log in to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Backend
        file: ./Backend/Dockerfile
        push: true
        tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Configure Azure Web App Container Settings and Deploy
      run: |
        az webapp config appsettings set \
          --name ${{ env.IMAGE_NAME }} \
          --resource-group employee-management-rg \
          --settings ASPNETCORE_ENVIRONMENT=Development WEBSITES_PORT=80

        az webapp config container set \
          --name ${{ env.IMAGE_NAME }} \
          --resource-group employee-management-rg \
          --docker-custom-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --docker-registry-server-url https://${{ env.ACR_LOGIN_SERVER }} \
          --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
          --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

        az webapp restart --name ${{ env.IMAGE_NAME }} --resource-group employee-management-rg

    - name: Smoke Test after Deployment
      run: |
        echo "Waiting for app to warm up..."
        sleep 150

        # Replace with your actual health or Swagger URL
        curl --fail https://ems-api-app-gje0ckgkcnhfcmbd.eastus2-01.azurewebsites.net/swagger/index.html
