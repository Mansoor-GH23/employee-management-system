name: Backend CD

on:
push:
branches:
- main

env:
AZURE_WEBAPP_NAME: ems-api-app
AZURE_RESOURCE_GROUP: employee-management
AZURE_CONTAINER_REGISTRY: emsacr.azurecr.io
IMAGE_NAME: ems-api-app

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Log in to Azure
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Log in to Azure Container Registry
    run: az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

  - name: Build and push Docker image
    run: |
      docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
      docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  - name: Deploy to Azure Web App
    uses: azure/webapps-deploy@v3
    with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      images: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}