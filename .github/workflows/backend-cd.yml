name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore EmployeeManagementSystem.sln

    - name: Build
      run: dotnet build EmployeeManagementSystem.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish EmployeeManagementSystem.Api/EmployeeManagementSystem.Api.csproj --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-publish-artifact
        path: Backend/publish
