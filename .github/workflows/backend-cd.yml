name: Backend CD

on:
push:
branches:
- main

env:
AZURE_WEBAPP_NAME: ems-api-app
AZURE_RESOURCE_GROUP: employee-management
ACR_LOGIN_SERVER: emsbackendregistry.azurecr.io
IMAGE_NAME: employee-management-api

jobs:
build-and-deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Log in to Azure
    uses: azure/login@v1
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Log in to ACR
    uses: docker/login-action@v3
    with:
      registry: ${{ env.ACR_LOGIN_SERVER }}
      username: ${{ secrets.ACR_USERNAME }}
      password: ${{ secrets.ACR_PASSWORD }}

  - name: Build and push Docker image to ACR
    run: |
      docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} .
      docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

  - name: Deploy to Azure Web App (Custom Image)
    uses: azure/webapps-deploy@v3
    with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}