name: Backend CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ems-api-app
  ACR_LOGIN_SERVER: emsacr123.azurecr.io   # Correct your ACR login server here

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx (for building multi-platform images)
      uses: docker/setup-buildx-action@v3

    - name: Log in to Azure Container Registry (ACR)
      uses: docker/login-action@v3
      with:
        registry: ${{ env.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image to ACR
      uses: docker/build-push-action@v5
      with:
        context: ./Backend                    # Use the Backend folder as build context
        file: ./Backend/Dockerfile            # Correct Dockerfile path
        push: true
        tags: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Log in to Azure using Service Principal
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Set WEBSITES_PORT app setting on Azure Web App
      run: |
        az webapp config appsettings set \
          --name ${{ env.IMAGE_NAME }} \
          --resource-group employee-management-rg \
          --settings WEBSITES_PORT=8181
      # NOTE: Change 8181 here if your app listens on a different port inside the container

    - name: Configure Azure Web App to use ACR image
      run: |
        az webapp config container set \
          --name ${{ env.IMAGE_NAME }} \
          --resource-group employee-management-rg \
          --docker-custom-image-name ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --docker-registry-server-url https://${{ env.ACR_LOGIN_SERVER }} \
          --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
          --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

    - name: Restart Azure Web App to apply changes
      run: |
        az webapp restart --name ${{ env.IMAGE_NAME }} --resource-group employee-management-rg

    # Optional: Tail logs (commented out because this step runs indefinitely)
    # - name: Tail Azure Web App logs
    #   run: |
    #     az webapp log tail --name ${{ env.IMAGE_NAME }} --resource-group employee-management-rg
