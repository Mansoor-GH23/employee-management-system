name: Backend CD

on:
push:
branches:
- main # Triggers on push to the main branch

env:
AZURE_WEBAPP_NAME: ems-api-app # 🔧 Your Azure Web App name
AZURE_RESOURCE_GROUP: employee-management # 🔧 Resource group for your Web App
AZURE_CONTAINER_REGISTRY: emsacr123.azurecr.io # 🔧 Your ACR login server
IMAGE_NAME: ems-api-app # 🔧 Name of Docker image in ACR

jobs:
deploy:
name: Deploy to Azure Web App
runs-on: ubuntu-latest

steps:
  - name: Checkout source code
    uses: actions/checkout@v4

  - name: Log in to Azure using service principal
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Log in to Azure Container Registry (ACR)
    run: |
      echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.AZURE_CONTAINER_REGISTRY }} \
        --username ${{ secrets.ACR_USERNAME }} \
        --password-stdin

  - name: Build Docker image
    run: |
      docker build -t ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest .

  - name: Push Docker image to ACR
    run: |
      docker push ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  - name: Deploy to Azure Web App (Linux container)
    uses: azure/webapps-deploy@v3
    with:
      app-name: ${{ env.AZURE_WEBAPP_NAME }}
      images: ${{ env.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      slot-name: production  # or specify a staging slot if used