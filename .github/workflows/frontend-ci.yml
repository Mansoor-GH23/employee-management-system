name: Frontend CI (Angular)

on:
push:
paths:
- 'Frontend/'
pull_request:
paths:
- 'Frontend/'

jobs:
build:
runs-on: ubuntu-latest

defaults:
  run:
    working-directory: Frontend

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Setup Node.js
  uses: actions/setup-node@v4
  with:
    node-version: '18'

- name: Install dependencies
  run: npm install

- name: Build Angular app
  run: npm run build