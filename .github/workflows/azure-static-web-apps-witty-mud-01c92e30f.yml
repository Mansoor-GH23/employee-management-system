name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular to Azure Static Web Apps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # Use Node LTS version

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend  # Adjust if Angular app root differs

      - name: Build Angular app (production)
        run: npm run build -- --configuration production
        working-directory: ./frontend

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "frontend"   # Angular source directory
          output_location: "frontend/dist/employee-management-client"  # Angular build output folder
          skip_app_build: true       # We already built app in a previous step
