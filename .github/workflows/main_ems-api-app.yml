# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ems-api-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: emsacr1234-bebrayhhgdd8e4gx.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_886D82D729784D0FB714C8D089755386 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_2FB14CA0058343499AF4FC96475B5D33 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: emsacr1234-bebrayhhgdd8e4gx.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_886D82D729784D0FB714C8D089755386 }}/ems-api-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    

    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DA0B8888757345F3984C43B9632E1603 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2EA9A038447F4D7FA29380611A306078 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52E335349B8B422CAEADE5D62A943382 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'ems-api-app'
          slot-name: 'Production'
          images: 'emsacr1234-bebrayhhgdd8e4gx.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_886D82D729784D0FB714C8D089755386 }}/ems-api-app:${{ github.sha }}'
          